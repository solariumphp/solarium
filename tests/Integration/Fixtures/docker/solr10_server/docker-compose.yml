services:
  solr10:
    image: solr:10
    ports:
      - 8983:8983
    environment:
      - SOLR_MODULES=extraction
    networks:
        solr:
            aliases:
              - solr
    volumes:
      - ../../../../../lucene-solr/solr/server/solr/configsets/sample_techproducts_configs/conf:/opt/solr/server/solr/configsets/solarium/conf
    command: bash -c "chown -R solr.solr /opt/solr/server/solr/configsets/solarium; cp -R /opt/solr/server/solr/configsets /var/solr/data/configsets; docker-entrypoint.sh solr start --user-managed -f"

  tika:
    image: apache/tika
    ports:
      - 9998:9998
    networks:
      - solr

  proxy:
    image: ubuntu/squid
    ports:
      - 8080:3128
    networks:
      - solr

networks:
  solr:
